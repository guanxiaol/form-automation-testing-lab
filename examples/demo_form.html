<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registration Demo Form</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8fafc;color:#0f172a;margin:0;padding:40px}
    main{max-width:520px;margin:0 auto;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:28px;box-shadow:0 20px 40px rgba(15,23,42,.08)}
    h1{font-size:24px;margin:0 0 8px}
    p{color:#64748b;margin:0 0 24px}
    label{display:block;font-weight:600;margin:14px 0 6px}
    input{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:10px;padding:11px 12px;font-size:15px}
    .check{display:flex;gap:10px;align-items:center;margin-top:18px}
    .check input{width:auto}
    button{margin-top:22px;width:100%;border:0;border-radius:10px;background:#2563eb;color:#fff;padding:12px 16px;font-size:16px;font-weight:700;cursor:pointer}
    button:hover{background:#1d4ed8}
    #result{margin-top:18px;color:#16a34a;font-weight:700;display:none}
  </style>
</head>
<body>
  <main>
    <h1>本地注册表单 Demo</h1>
    <p>此页面只用于演示 Playwright 自动填写表单。</p>

    <form id="form">
      <label for="first-name">First name</label>
      <input id="first-name" name="first_name" autocomplete="given-name">

      <label for="last-name">Last name</label>
      <input id="last-name" name="last_name" autocomplete="family-name">

      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email">

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="new-password">

      <label class="check">
        <input id="terms" type="checkbox">
        <span>我确认这是本地授权测试。</span>
      </label>

      <button id="submit" type="submit">Create demo account</button>
      <div id="result">Demo form submitted successfully.</div>
    </form>
  </main>

  <script>
    document.getElementById('form').addEventListener('submit', (event) => {
      event.preventDefault();
      document.getElementById('result').style.display = 'block';
    });
  </script>
</body>
</html>
